<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WK 2026 Voorspeller</title><link rel="stylesheet" href="styles.css"></head><body><header class="hero"><h1>WK 2026 Voorspeller</h1><p>Baseline voorspelling + live/projected stand. SportSRC is optioneel: velden die ontbreken worden overgeslagen.</p></header><main><section class="controls"><label>SportSRC API-key<input id="sportsrcKey" type="password" placeholder="optioneel"></label><label>SportSRC endpoint<input id="sportsrcEndpoint" type="text" placeholder="optioneel, zie README"></label><label>Simulaties<input id="simulations" type="number" min="100" max="50000" step="100" value="5000"></label><label>Goals per wedstrijd<input id="goalBase" type="number" min="1.5" max="4" step="0.1" value="2.6"></label><button id="saveBtn">Opslaan</button><button id="runBtn">Genereer</button><button id="clearBtn" class="secondary">Cache wissen</button></section><div id="status" class="status"></div><nav class="tabs"><button class="tab active" data-tab="summary">Samenvatting</button><button class="tab" data-tab="groups">Poulefase</button><button class="tab" data-tab="knockout">Knock-out</button><button class="tab" data-tab="chances">Kansen</button><button class="tab" data-tab="data">Data</button></nav><section id="summary" class="tabPanel active"></section><section id="groups" class="tabPanel"></section><section id="knockout" class="tabPanel"></section><section id="chances" class="tabPanel"></section><section id="data" class="tabPanel"></section></main><script src="app.js"></script></body></html>
