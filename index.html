<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WK 2026 Voorspeller</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1>WK 2026 Voorspeller</h1>
    <p>Voorspellingen op basis van Elo, expected goals, Poisson en Monte Carlo.</p>
  </header>

  <main>
    <section class="controls">
      <label>
        Simulaties
        <input id="simulations" type="number" min="100" max="50000" step="100" value="5000">
      </label>
      <label>
        Goals per wedstrijd
        <input id="goalBase" type="number" min="1.5" max="4" step="0.1" value="2.6">
      </label>
      <button id="runBtn">Genereer voorspelling</button>
    </section>

    <nav class="tabs">
      <button class="tab active" data-tab="summary">Samenvatting</button>
      <button class="tab" data-tab="groups">Groepsfase</button>
      <button class="tab" data-tab="knockout">Knock-out</button>
      <button class="tab" data-tab="chances">Kansen</button>
    </nav>

    <section id="summary" class="tabPanel active"></section>
    <section id="groups" class="tabPanel"></section>
    <section id="knockout" class="tabPanel"></section>
    <section id="chances" class="tabPanel"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
