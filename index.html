<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WK Predictor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>WK Predictor</h1>
    <p>API-Football + Elo + Poisson + Monte Carlo</p>
  </header>

  <main>
    <section class="card grid">
      <div>
        <label>API-Football key</label>
        <input id="apiKey" type="password" placeholder="x-apisports-key" autocomplete="off" />
      </div>
      <div>
        <label>Toernooi</label>
        <select id="tournament">
          <option value="1:2026">FIFA World Cup 2026</option>
          <option value="4:2024">Euro 2024</option>
          <option value="2:2025">UEFA Champions League 2025</option>
        </select>
      </div>
      <div>
        <label>Simulaties</label>
        <input id="simulations" type="number" min="100" max="50000" step="100" value="10000" />
      </div>
      <div class="actions">
        <button id="saveBtn">Opslaan</button>
        <button id="runBtn">Genereer voorspelling</button>
      </div>
    </section>

    <section id="status" class="status">Vul je API-key in en klik op opslaan.</section>

    <section class="tabs">
      <button data-tab="fixtures" class="active">Wedstrijden</button>
      <button data-tab="groups">Groepen</button>
      <button data-tab="chances">Kansen</button>
      <button data-tab="debug">Debug</button>
    </section>

    <section id="fixtures" class="panel active"></section>
    <section id="groups" class="panel"></section>
    <section id="chances" class="panel"></section>
    <section id="debug" class="panel"></section>
  </main>

  <footer>
    <small>Keys worden alleen in jouw browser opgeslagen via localStorage.</small>
  </footer>

  <script src="elo.js"></script>
  <script src="app.js"></script>
</body>
</html>
